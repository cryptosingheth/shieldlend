[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.27"
remappings = ["poseidon-solidity/=lib/poseidon-solidity/"]

# ---------------------------------------------------------------------------
# Dependencies (contracts/lib/ is gitignored — run these to restore):
#
#   forge install foundry-rs/forge-std --no-commit
#   forge install iden3/poseidon-solidity --no-commit
#
# Only these two are used:
#   - forge-std  → imported by all test files (forge-std/Test.sol)
#   - poseidon-solidity → imported by ShieldedPool.sol (PoseidonT3)
# ---------------------------------------------------------------------------
