[profile.default]
src = "contracts/src"
out = "contracts/out"
libs = ["contracts/lib", "node_modules"]
test = "contracts/test"
script = "contracts/script"
cache_path = "contracts/cache"
solc = "0.8.24"

optimizer = true
optimizer_runs = 200

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
horizen_l3 = "${HORIZEN_L3_RPC_URL}"
anvil = "http://127.0.0.1:8545"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
